<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insurance Lead Capture System</title>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/react.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/react-dom.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            color: #333;
        }
        .navbar {
            background-color: #2c3e50;
            color: white;
            padding: 15px 20px;
            display: flex;
            gap: 20px;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .navbar h2 {
            font-size: 20px;
        }
        .navbar-buttons {
            margin-left: auto;
            display: flex;
            gap: 10px;
        }
        .nav-btn {
            padding: 8px 15px;
            background-color: transparent;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        .nav-btn.active {
            background-color: #4CAF50;
        }
        .nav-btn:hover {
            background-color: #34495e;
        }
        .container {
            background-color: white;
            padding: 20px;
        }
        .form-container {
            max-width: 600px;
            margin: 0 auto;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #2c3e50;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ddd;
            font-size: 14px;
            background-color: #f9f9f9;
        }
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #4CAF50;
            background-color: white;
            box-shadow: 0 0 5px rgba(76, 175, 80, 0.2);
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .submit-btn {
            width: 100%;
            padding: 12px;
            background-color: #2c3e50;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .submit-btn:hover {
            background-color: #34495e;
        }
        .success-box {
            margin-top: 20px;
            padding: 15px;
            background-color: #e8f5e9;
            border-radius: 8px;
            border: 1px solid #4CAF50;
            color: #2e7d32;
        }
        .dashboard {
            padding: 20px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }
        .stat-card {
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            color: white;
        }
        .stat-card.blue { background-color: #2196F3; }
        .stat-card.orange { background-color: #FF9800; }
        .stat-card.purple { background-color: #9C27B0; }
        .stat-card.green { background-color: #4CAF50; }
        .stat-card .number {
            font-size: 24px;
            font-weight: bold;
        }
        .stat-card .label {
            font-size: 12px;
            margin-top: 5px;
        }
        .export-btn {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .export-btn:hover {
            background-color: #45a049;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: #fff;
            margin-top: 10px;
        }
        table thead {
            background-color: #2c3e50;
            color: white;
        }
        table th {
            padding: 10px;
            text-align: left;
            border-bottom: 2px solid #ddd;
            font-weight: bold;
        }
        table td {
            padding: 10px;
            border-bottom: 1px solid #eee;
        }
        table tbody tr:hover {
            background-color: #f9f9f9;
        }
        .status-badge {
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: bold;
        }
        .status-new { background-color: #bbdefb; color: #1976d2; }
        .status-contacted { background-color: #ffe0b2; color: #f57c00; }
        .status-qualified { background-color: #e1bee7; color: #7b1fa2; }
        .status-closed { background-color: #c8e6c9; color: #388e3c; }
        .agent-select {
            padding: 8px;
            font-size: 14px;
            border-radius: 5px;
            border: 1px solid #ddd;
            margin-bottom: 20px;
        }
        .delete-btn {
            padding: 5px 10px;
            font-size: 12px;
            background-color: #ff6b6b;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }
        .delete-btn:hover {
            background-color: #ff5252;
        }
        .status-select {
            padding: 5px;
            font-size: 12px;
            border-radius: 3px;
            border: 1px solid #ddd;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
        }
        h3 {
            color: #2c3e50;
            margin-top: 20px;
            margin-bottom: 15px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 20px;
        }
        .no-leads {
            color: #999;
            padding: 20px;
            text-align: center;
        }
        .table-responsive {
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const LeadCaptureSystem = () => {
            const AGENTS = [
                'Agent 1', 'Agent 2', 'Agent 3', 'Agent 4', 'Agent 5',
                'Agent 6', 'Agent 7', 'Agent 8', 'Agent 9', 'Agent 10'
            ];

            const INCOME_BRACKETS = [
                '$30k-$50k', '$50k-$75k', '$75k-$100k', '$100k-$150k',
                '$150k-$250k', '$250k+'
            ];

            const [leads, setLeads] = useState([]);
            const [currentView, setCurrentView] = useState('capture');
            const [selectedAgent, setSelectedAgent] = useState('Agent 1');
            const [nextAgentIndex, setNextAgentIndex] = useState(0);
            const [formData, setFormData] = useState({
                name: '', phone: '', email: '', age: '', income: '',
                zipCode: '', preferredColor: '#3498db', source: 'Direct'
            });

            const handleFormChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
            };

            const handleSubmitLead = (e) => {
                e.preventDefault();
                if (!formData.name || !formData.phone || !formData.email) {
                    alert('Please fill in Name, Phone, and Email');
                    return;
                }

                const newLead = {
                    id: `LEAD-${Date.now()}`,
                    ...formData,
                    assignedAgent: AGENTS[nextAgentIndex],
                    status: 'New',
                    followUpDate: new Date().toISOString().split('T')[0],
                    createdAt: new Date().toISOString(),
                };

                setLeads(prev => [...prev, newLead]);
                setNextAgentIndex((nextAgentIndex + 1) % AGENTS.length);
                setFormData({
                    name: '', phone: '', email: '', age: '', income: '',
                    zipCode: '', preferredColor: '#3498db', source: 'Direct'
                });
                alert(`✅ Lead captured! Assigned to ${newLead.assignedAgent}`);
            };

            const exportToCSV = () => {
                if (leads.length === 0) {
                    alert('No leads to export');
                    return;
                }

                const headers = ['ID', 'Name', 'Phone', 'Email', 'Age', 'Income', 'Zip Code', 'Preferred Color', 'Source', 'Assigned Agent', 'Status', 'Follow-up Date'];
                const rows = leads.map(lead => [
                    lead.id, lead.name, lead.phone, lead.email, lead.age, lead.income,
                    lead.zipCode, lead.preferredColor, lead.source, lead.assignedAgent,
                    lead.status, lead.followUpDate
                ]);

                let csv = headers.join(',') + '\n';
                rows.forEach(row => {
                    csv += row.map(cell => `"${cell || ''}"`).join(',') + '\n';
                });

                const blob = new Blob([csv], { type: 'text/csv' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `leads-${new Date().toISOString().split('T')[0]}.csv`;
                a.click();
            };

            const LeadCaptureForm = () => (
                <div className="form-container">
                    <h1>📝 Lead Capture Form</h1>
                    <p className="subtitle">Capture new insurance leads - automatically assigned to agents via round-robin</p>
                    <form onSubmit={handleSubmitLead}>
                        <div className="form-group">
                            <label>Full Name *</label>
                            <input type="text" name="name" value={formData.name} onChange={handleFormChange} placeholder="John Smith" required />
                        </div>
                        <div className="form-group">
                            <label>Phone Number *</label>
                            <input type="tel" name="phone" value={formData.phone} onChange={handleFormChange} placeholder="(305) 555-0123" required />
                        </div>
                        <div className="form-group">
                            <label>Email Address *</label>
                            <input type="email" name="email" value={formData.email} onChange={handleFormChange} placeholder="john@example.com" required />
                        </div>
                        <div className="form-row">
                            <div className="form-group">
                                <label>Age</label>
                                <input type="number" name="age" value={formData.age} onChange={handleFormChange} placeholder="45" />
                            </div>
                            <div className="form-group">
                                <label>Income Bracket</label>
                                <select name="income" value={formData.income} onChange={handleFormChange}>
                                    <option value="">Select...</option>
                                    {INCOME_BRACKETS.map(bracket => <option key={bracket} value={bracket}>{bracket}</option>)}
                                </select>
                            </div>
                        </div>
                        <div className="form-row">
                            <div className="form-group">
                                <label>Zip Code</label>
                                <input type="text" name="zipCode" value={formData.zipCode} onChange={handleFormChange} placeholder="33101" />
                            </div>
                            <div className="form-group">
                                <label>Preferred Color</label>
                                <input type="color" name="preferredColor" value={formData.preferredColor} onChange={handleFormChange} style={{ height: '40px', cursor: 'pointer' }} />
                            </div>
                        </div>
                        <div className="form-group">
                            <label>Lead Source</label>
                            <select name="source" value={formData.source} onChange={handleFormChange}>
                                <option>Direct</option>
                                <option>Google Ads</option>
                                <option>Facebook Ads</option>
                                <option>Referral</option>
                                <option>Lead Aggregator</option>
                                <option>Other</option>
                            </select>
                        </div>
                        <button type="submit" className="submit-btn">✅ Capture Lead (Auto-Assigned)</button>
                    </form>
                    <div className="success-box">
                        <p><strong>✓ System Active:</strong> Leads will be automatically assigned to agents via round-robin distribution. Check the Admin Dashboard to view all leads.</p>
                    </div>
                </div>
            );

            const AdminDashboard = () => {
                const statsByAgent = AGENTS.map(agent => ({
                    agent,
                    total: leads.filter(l => l.assignedAgent === agent).length,
                    new: leads.filter(l => l.assignedAgent === agent && l.status === 'New').length,
                    contacted: leads.filter(l => l.assignedAgent === agent && l.status === 'Contacted').length,
                    qualified: leads.filter(l => l.assignedAgent === agent && l.status === 'Qualified').length,
                    closed: leads.filter(l => l.assignedAgent === agent && l.status === 'Closed').length
                }));

                return (
                    <div className="dashboard">
                        <h1>📊 Admin Dashboard - Lead Management</h1>
                        <div style={{ marginBottom: '20px' }}>
                            <div className="stats-grid">
                                <div className="stat-card blue">
                                    <div className="number">{leads.length}</div>
                                    <div className="label">Total Leads</div>
                                </div>
                                <div className="stat-card orange">
                                    <div className="number">{leads.filter(l => l.status === 'New').length}</div>
                                    <div className="label">New</div>
                                </div>
                                <div className="stat-card orange">
                                    <div className="number">{leads.filter(l => l.status === 'Contacted').length}</div>
                                    <div className="label">Contacted</div>
                                </div>
                                <div className="stat-card purple">
                                    <div className="number">{leads.filter(l => l.status === 'Qualified').length}</div>
                                    <div className="label">Qualified</div>
                                </div>
                                <div className="stat-card green">
                                    <div className="number">{leads.filter(l => l.status === 'Closed').length}</div>
                                    <div className="label">Closed</div>
                                </div>
                            </div>
                        </div>
                        <button className="export-btn" onClick={exportToCSV}>📥 Export All Leads to CSV</button>

                        <h3>👥 Leads by Agent (Round-Robin Distribution)</h3>
                        <div className="table-responsive">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Agent</th>
                                        <th style={{ textAlign: 'center' }}>Total</th>
                                        <th style={{ textAlign: 'center' }}>New</th>
                                        <th style={{ textAlign: 'center' }}>Contacted</th>
                                        <th style={{ textAlign: 'center' }}>Qualified</th>
                                        <th style={{ textAlign: 'center' }}>Closed</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {statsByAgent.map(stat => (
                                        <tr key={stat.agent}>
                                            <td><strong>{stat.agent}</strong></td>
                                            <td style={{ textAlign: 'center' }}>{stat.total}</td>
                                            <td style={{ textAlign: 'center', backgroundColor: '#e3f2fd' }}>{stat.new}</td>
                                            <td style={{ textAlign: 'center', backgroundColor: '#fff3e0' }}>{stat.contacted}</td>
                                            <td style={{ textAlign: 'center', backgroundColor: '#f3e5f5' }}>{stat.qualified}</td>
                                            <td style={{ textAlign: 'center', backgroundColor: '#e8f5e9' }}>{stat.closed}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>

                        <h3>📋 All Leads</h3>
                        {leads.length === 0 ? (
                            <p className="no-leads">No leads captured yet. Start with the Lead Capture form!</p>
                        ) : (
                            <div className="table-responsive">
                                <table style={{ fontSize: '13px' }}>
                                    <thead>
                                        <tr>
                                            <th>ID</th>
                                            <th>Name</th>
                                            <th>Phone</th>
                                            <th>Email</th>
                                            <th style={{ textAlign: 'center' }}>Age</th>
                                            <th>Income</th>
                                            <th>Agent</th>
                                            <th style={{ textAlign: 'center' }}>Status</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {leads.map(lead => (
                                            <tr key={lead.id}>
                                                <td><small>{lead.id}</small></td>
                                                <td>{lead.name}</td>
                                                <td>{lead.phone}</td>
                                                <td><small>{lead.email}</small></td>
                                                <td style={{ textAlign: 'center' }}>{lead.age}</td>
                                                <td>{lead.income}</td>
                                                <td><strong>{lead.assignedAgent}</strong></td>
                                                <td style={{ textAlign: 'center' }}>
                                                    <span className={`status-badge status-${lead.status.toLowerCase()}`}>{lead.status}</span>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </div>
                );
            };

            const AgentDashboard = () => {
                const agentLeads = leads.filter(l => l.assignedAgent === selectedAgent);
                
                return (
                    <div className="dashboard">
                        <h1>👤 Agent Dashboard</h1>
                        <div style={{ marginBottom: '20px' }}>
                            <label style={{ marginRight: '10px', fontWeight: 'bold' }}>Select Agent: </label>
                            <select 
                                value={selectedAgent} 
                                onChange={(e) => setSelectedAgent(e.target.value)}
                                className="agent-select"
                            >
                                {AGENTS.map(agent => <option key={agent} value={agent}>{agent}</option>)}
                            </select>
                        </div>
                        <div className="stats-grid">
                            <div className="stat-card blue">
                                <div className="number">{agentLeads.length}</div>
                                <div className="label">Total Leads</div>
                            </div>
                            <div className="stat-card orange">
                                <div className="number">{agentLeads.filter(l => l.status === 'New').length}</div>
                                <div className="label">New</div>
                            </div>
                            <div className="stat-card purple">
                                <div className="number">{agentLeads.filter(l => l.status === 'Qualified').length}</div>
                                <div className="label">Qualified</div>
                            </div>
                            <div className="stat-card green">
                                <div className="number">{agentLeads.filter(l => l.status === 'Closed').length}</div>
                                <div className="label">Closed</div>
                            </div>
                        </div>

                        <h3>📞 Your Assigned Leads</h3>
                        {agentLeads.length === 0 ? (
                            <p className="no-leads">No leads assigned to you yet.</p>
                        ) : (
                            <div className="table-responsive">
                                <table>
                                    <thead>
                                        <tr>
                                            <th>Name</th>
                                            <th>Phone</th>
                                            <th>Email</th>
                                            <th style={{ textAlign: 'center' }}>Age</th>
                                            <th>Income</th>
                                            <th>Status</th>
                                            <th style={{ textAlign: 'center' }}>Action</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {agentLeads.map(lead => (
                                            <tr key={lead.id}>
                                                <td><strong>{lead.name}</strong></td>
                                                <td>{lead.phone}</td>
                                                <td>{lead.email}</td>
                                                <td style={{ textAlign: 'center' }}>{lead.age}</td>
                                                <td>{lead.income}</td>
                                                <td>
                                                    <select 
                                                        value={lead.status}
                                                        onChange={(e) => {
                                                            setLeads(leads.map(l => l.id === lead.id ? { ...l, status: e.target.value } : l));
                                                        }}
                                                        className="status-select"
                                                    >
                                                        <option>New</option>
                                                        <option>Contacted</option>
                                                        <option>Qualified</option>
                                                        <option>Closed</option>
                                                    </select>
                                                </td>
                                                <td style={{ textAlign: 'center' }}>
                                                    <button 
                                                        onClick={() => setLeads(leads.filter(l => l.id !== lead.id))}
                                                        className="delete-btn"
                                                    >
                                                        Delete
                                                    </button>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </div>
                );
            };

            return (
                <div>
                    <div className="navbar">
                        <h2>🎯 Insurance Lead Capture System</h2>
                        <div className="navbar-buttons">
                            <button 
                                className={`nav-btn ${currentView === 'capture' ? 'active' : ''}`}
                                onClick={() => setCurrentView('capture')}
                            >
                                📝 Capture Lead
                            </button>
                            <button 
                                className={`nav-btn ${currentView === 'admin' ? 'active' : ''}`}
                                onClick={() => setCurrentView('admin')}
                            >
                                📊 Admin
                            </button>
                            <button 
                                className={`nav-btn ${currentView === 'agent' ? 'active' : ''}`}
                                onClick={() => setCurrentView('agent')}
                            >
                                👤 Agent
                            </button>
                        </div>
                    </div>
                    <div className="container">
                        {currentView === 'capture' && <LeadCaptureForm />}
                        {currentView === 'admin' && <AdminDashboard />}
                        {currentView === 'agent' && <AgentDashboard />}
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<LeadCaptureSystem />);
    </script>
</body>
</html>
